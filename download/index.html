<style>
  :root{--navy:#0d2137;--navy3:#1f3c5c;--orange:#ff6b1a;--orange-d:#e85a0c;}

  body{min-height:100vh;background:radial-gradient(120% 90% at 80% 0%,var(--navy3),var(--navy) 60%);

  .intro{font-size:14.5px;color:#aebfcf;line-height:1.65;text-align:center;max-width:600px;margin:0 auto 30px;}

  .history h2{font-size:17px;color:#dfe7ef;font-weight:700;margin-bottom:14px;}
  table{width:100%;border-collapse:collapse;font-size:14.5px;}
  thead th{color:#8aa0b8;font-weight:700;font-size:12.5px;text-align:left;padding:0 10px 10px;border-bottom:1px solid rgba(255,255,255,.18);}
  tbody td{padding:14px 10px;border-bottom:1px solid rgba(255,255,255,.12);color:#c4d3e2;vertical-align:top;line-height:1.55;}
  td.ver{font-weight:800;color:#fff;white-space:nowrap;}
  td.date{white-space:nowrap;color:#9fb4c9;}
  td.dl{text-align:right;white-space:nowrap;}
  .latest{display:inline-block;background:var(--orange);color:#fff;font-size:10.5px;font-weight:800;
          padding:2px 8px;border-radius:999px;margin-left:6px;vertical-align:middle;}
  .dlbtn{display:inline-block;background:var(--orange);color:#fff;font-weight:800;font-size:14px;
         text-decoration:none;padding:10px 20px;border-radius:999px;}
  .dlbtn:hover{background:var(--orange-d);}
  .dlbtn small{font-weight:600;font-size:11px;opacity:.85;}

  .links{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:38px;}
  .links a{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:#dfe7ef;
           text-decoration:none;font-weight:700;font-size:15px;padding:13px 22px;border-radius:12px;}
  .links a:hover{background:rgba(255,255,255,.16);}
  .foot{margin-top:26px;font-size:13px;color:#7c91a6;text-align:center;}
  .foot a{color:var(--orange);text-decoration:none;}

  @media(max-width:600px){
    table,thead,tbody,tr,td,th{display:block;}
    thead{display:none;}
    tbody tr{border:1px solid rgba(255,255,255,.16);border-radius:12px;padding:12px;margin-bottom:14px;}
    tbody td{border:0;padding:3px 0;}
    td.dl{text-align:left;margin-top:8px;}
  }
</style>
</head>
