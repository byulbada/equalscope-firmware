<style>
  :root{--navy:#0d2137;--navy3:#1f3c5c;--orange:#ff6b1a;--orange-d:#e85a0c;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;background:radial-gradient(120% 100% at 80% 0%,var(--navy3),var(--navy) 60%);
       color:#fff;font-family:"Pretendard","Malgun Gothic","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
       display:flex;align-items:center;justify-content:center;padding:40px 20px;}
  .wrap{width:100%;max-width:560px;text-align:center;}

  .btn{display:block;background:var(--orange);color:#fff;font-size:19px;font-weight:800;
       padding:20px;border-radius:14px;text-decoration:none;box-shadow:0 10px 26px rgba(255,107,26,.3);}
  .btn:hover{background:var(--orange-d);}
  .btn small{display:block;font-size:13px;font-weight:600;opacity:.9;margin-top:4px;}
  .note{font-size:14px;color:#aebfcf;line-height:1.6;margin:18px 0 28px;}
  .note a{color:var(--orange);text-decoration:none;}
  .links{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .links a{flex:1;min-width:140px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);
           color:#dfe7ef;text-decoration:none;font-weight:700;font-size:15px;padding:14px;border-radius:12px;}
  .links a:hover{background:rgba(255,255,255,.16);}
  .foot{margin-top:28px;font-size:13px;color:#7c91a6;}
  .foot a{color:var(--orange);text-decoration:none;}
